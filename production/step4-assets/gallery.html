<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>榕泉 — Step 4 视觉资产总览</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0a0c; --surface: #141418; --surface2: #1c1c22;
    --border: #2a2a32; --text: #e8e8ec; --text2: #8888a0;
    --accent: #6366f1; --accent2: #818cf8; --accent-glow: rgba(99,102,241,.15);
    --radius: 12px; --transition: .25s cubic-bezier(.4,0,.2,1);
  }
  html { font-size: 15px; }
  body {
    font-family: -apple-system, "SF Pro Display", "Noto Sans SC", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,12,.82); backdrop-filter: blur(20px) saturate(1.6);
    border-bottom: 1px solid var(--border); padding: 0 2rem;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo { display: flex; align-items: center; gap: .6rem; }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    display: grid; place-items: center; font-weight: 700; font-size: 14px; color:#fff;
  }
  .logo h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -.02em; }
  .logo span { color: var(--text2); font-weight: 400; font-size: .85rem; margin-left: .4rem; }

  .stats {
    display: flex; gap: 1.5rem; font-size: .82rem; color: var(--text2);
  }
  .stats strong { color: var(--accent2); font-weight: 600; }

  /* ── Filter Bar ── */
  .filter-bar {
    max-width: 1400px; margin: 1.5rem auto 0; padding: 0 2rem;
    display: flex; gap: .5rem; flex-wrap: wrap;
  }
  .filter-btn {
    padding: .45rem 1rem; border-radius: 99px; font-size: .82rem;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); cursor: pointer; transition: var(--transition);
    font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; box-shadow: 0 0 16px var(--accent-glow);
  }

  /* ── Grid ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }

  .category-section { margin-bottom: 2.5rem; }
  .category-header {
    display: flex; align-items: center; gap: .6rem;
    margin-bottom: 1rem; padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
  }
  .category-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: grid; place-items: center; font-size: 14px;
  }
  .cat-characters .category-icon { background: rgba(239,68,68,.15); color: #ef4444; }
  .cat-locations .category-icon { background: rgba(34,197,94,.15); color: #22c55e; }
  .cat-props .category-icon { background: rgba(234,179,8,.15); color: #eab308; }
  .category-header h2 { font-size: 1rem; font-weight: 600; }
  .category-header .count { color: var(--text2); font-size: .8rem; font-weight: 400; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
  }

  /* ── Card ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: var(--transition); cursor: pointer; position: relative;
  }
  .card:hover {
    border-color: var(--accent); transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,.4), 0 0 0 1px var(--accent);
  }
  .card-img {
    aspect-ratio: 3/4; width: 100%; object-fit: cover;
    background: var(--surface2); display: block;
  }
  .card-empty {
    aspect-ratio: 3/4; width: 100%;
    background: var(--surface2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text2); font-size: .75rem; gap: .4rem;
  }
  .card-empty-icon { font-size: 1.6rem; opacity: .3; }
  .card-info { padding: .65rem .75rem; }
  .card-name { font-size: .85rem; font-weight: 600; line-height: 1.3; }
  .card-meta { font-size: .72rem; color: var(--text2); margin-top: .2rem; }
  .card-badge {
    position: absolute; top: .5rem; right: .5rem; padding: .15rem .5rem;
    border-radius: 99px; font-size: .65rem; font-weight: 600;
    backdrop-filter: blur(8px);
  }
  .badge-has { background: rgba(99,102,241,.7); color:#fff; }
  .badge-empty { background: rgba(255,255,255,.1); color: var(--text2); }

  /* ── Stage chips ── */
  .stage-chips { display: flex; flex-wrap: wrap; gap: .25rem; margin-top: .4rem; }
  .stage-chip {
    font-size: .62rem; padding: .1rem .4rem; border-radius: 4px;
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.92); backdrop-filter: blur(24px);
    display: none; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .3s;
  }
  .lightbox.show { display: flex; opacity: 1; }
  .lightbox-close {
    position: absolute; top: 1.2rem; right: 1.5rem;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
    color: #fff; font-size: 1.2rem; cursor: pointer;
    display: grid; place-items: center; transition: var(--transition);
  }
  .lightbox-close:hover { background: rgba(255,255,255,.15); }
  .lightbox-content { text-align: center; max-width: 90vw; }
  .lightbox-content img {
    max-height: 80vh; max-width: 85vw; border-radius: 8px;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
  }
  .lightbox-caption {
    margin-top: 1rem; font-size: 1rem; font-weight: 500;
  }
  .lightbox-sub { color: var(--text2); font-size: .82rem; margin-top: .3rem; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center; padding: 4rem 1rem; color: var(--text2);
  }
  .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .3; }

  /* ── Toggle ── */
  .view-toggle {
    display: flex; gap: .3rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; padding: 3px;
  }
  .view-btn {
    padding: .35rem .7rem; border-radius: 6px; font-size: .78rem;
    border: none; background: transparent; color: var(--text2);
    cursor: pointer; transition: var(--transition); font-family: inherit;
  }
  .view-btn.active { background: var(--accent); color: #fff; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .header-inner { flex-wrap: wrap; height: auto; padding: .8rem 0; gap: .5rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: .7rem; }
    .filter-bar, .container { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">泉</div>
      <h1>榕泉 <span>Step 4 视觉资产</span></h1>
    </div>
    <div style="display:flex; align-items:center; gap:1.2rem;">
      <div class="stats">
        <span>资产 <strong id="stat-total">-</strong></span>
        <span>已生成 <strong id="stat-done">-</strong></span>
        <span>待生成 <strong id="stat-pending">-</strong></span>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" data-view="all" title="全部">全部</button>
        <button class="view-btn" data-view="done" title="已生成">已生成</button>
        <button class="view-btn" data-view="empty" title="待生成">待生成</button>
      </div>
    </div>
  </div>
</header>

<div class="filter-bar" id="filterBar"></div>
<div class="container" id="gallery"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-content">
    <img id="lb-img" src="" alt="">
    <div class="lightbox-caption" id="lb-caption"></div>
    <div class="lightbox-sub" id="lb-sub"></div>
  </div>
</div>

// ── Scan directory at load time (static fallback) ──
// Since this is a static HTML opened via file://, we embed data at build time.
// The HTML ships with a <script id="data"> block.

const data = ASSET_DATA || JSON.parse(document.getElementById('asset-data')?.textContent || '[]');

// ── State ──
let activeCategory = 'all';
let activeView = 'all';

// ── Render ──
function render() {
  const gallery = document.getElementById('gallery');
  const categories = { characters: [], locations: [], props: [] };
  const catLabels = { characters: '角色', locations: '场景', props: '道具' };
  const catIcons = { characters: '👤', locations: '🏔', props: '🔮' };

  data.forEach(d => {
    if (categories[d.category]) categories[d.category].push(d);
  });

  let html = '';
  let totalAll = 0, totalDone = 0;

  for (const [cat, items] of Object.entries(categories)) {
    if (activeCategory !== 'all' && activeCategory !== cat) continue;

    const filtered = items.filter(item => {
      if (activeView === 'done') return item.images.length > 0;
      if (activeView === 'empty') return item.images.length === 0;
      return true;
    });

    totalAll += items.length;
    totalDone += items.filter(i => i.images.length > 0).length;

    if (filtered.length === 0) continue;

    html += `<div class="category-section cat-${cat}">
      <div class="category-header">
        <div class="category-icon">${catIcons[cat]}</div>
        <h2>${catLabels[cat]}</h2>
        <span class="count">${filtered.length} 项</span>
      </div>
      <div class="grid">`;

    filtered.forEach(item => {
      const hasImg = item.images.length > 0;
      const mainImg = hasImg ? item.images[0] : null;
      const badge = hasImg
        ? `<div class="card-badge badge-has">${item.images.length} 张</div>`
        : `<div class="card-badge badge-empty">待生成</div>`;

      html += `<div class="card" ${hasImg ? `onclick="openLightbox('${mainImg.path}','${item.name}','${mainImg.label}')"` : ''}>`;

      if (hasImg) {
        html += `<img class="card-img" src="${mainImg.path}" alt="${item.name}" loading="lazy">`;
      } else {
        html += `<div class="card-empty"><div class="card-empty-icon">◻</div><span>暂无图片</span></div>`;
      }

      html += badge;
      html += `<div class="card-info"><div class="card-name">${item.name}</div>`;
      html += `<div class="card-meta">${item.stages.length} 个阶段</div>`;

      if (item.stages.length > 0 && item.stages.length <= 6) {
        html += `<div class="stage-chips">${item.stages.map(s => `<span class="stage-chip">${s}</span>`).join('')}</div>`;
      }

      html += `</div></div>`;
    });

    html += `</div></div>`;
  }

  if (!html) {
    html = `<div class="empty-state"><div class="empty-state-icon">◻</div><p>当前筛选条件下无资产</p></div>`;
  }

  gallery.innerHTML = html;
  document.getElementById('stat-total').textContent = totalAll;
  document.getElementById('stat-done').textContent = totalDone;
  document.getElementById('stat-pending').textContent = totalAll - totalDone;
}

function buildFilters() {
  const bar = document.getElementById('filterBar');
  const cats = [
    { key: 'all', label: '全部' },
    { key: 'characters', label: '👤 角色' },
    { key: 'locations', label: '🏔 场景' },
    { key: 'props', label: '🔮 道具' },
  ];
  bar.innerHTML = cats.map(c =>
    `<button class="filter-btn ${c.key === activeCategory ? 'active' : ''}" data-cat="${c.key}">${c.label}</button>`
  ).join('');

  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

// View toggle
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeView = btn.dataset.view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// Lightbox
function openLightbox(src, name, label) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-caption').textContent = name;
  document.getElementById('lb-sub').textContent = label;
  lb.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Init ──
buildFilters();
render();
</script>
